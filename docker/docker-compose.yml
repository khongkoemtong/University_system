version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.dockerfile
    ports:
      - "8000:80"
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: university_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: 1234
    depends_on:
      - db  
volumes:
  db_data: